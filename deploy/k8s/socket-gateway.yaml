apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket-gateway
  namespace: aurathink
  labels:
    app: socket-gateway
    app.kubernetes.io/part-of: aurathink-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socket-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: socket-gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: socket-gateway
          image: aurathink-server:latest
          command: ['node', 'dist/apps/socket-gateway/main.js']
          ports:
            - containerPort: 3002
              name: ws
          envFrom:
            - configMapRef:
                name: aurathink-config
            - secretRef:
                name: aurathink-secrets
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '384Mi'
              cpu: '500m'
          livenessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: socket-gateway
  namespace: aurathink
spec:
  selector:
    app: socket-gateway
  ports:
    - port: 3002
      targetPort: 3002
      name: ws
  type: ClusterIP
