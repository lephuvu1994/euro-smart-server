# Docker Compose – Production
# ─────────────────────────────
# Runs all 4 microservices as separate containers.
# Infrastructure (Postgres, Redis, EMQX) is managed externally.
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down

services:
  core-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: euro-core-api
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-3001}:${HTTP_PORT:-3001}'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    command: ['node', 'dist/apps/core-api/main.js']
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:${HTTP_PORT:-3001}/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  socket-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: euro-socket-gateway
    restart: unless-stopped
    ports:
      - '${SOCKET_GATEWAY_PORT:-3002}:${SOCKET_GATEWAY_PORT:-3002}'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    command: ['node', 'dist/apps/socket-gateway/main.js']
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  iot-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: euro-iot-gateway
    restart: unless-stopped
    ports:
      - '${IOT_GATEWAY_PORT:-3003}:${IOT_GATEWAY_PORT:-3003}'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    command: ['node', 'dist/apps/iot-gateway/main.js']
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  worker-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: euro-worker-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    command: ['node', 'dist/apps/worker-service/main.js']
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
