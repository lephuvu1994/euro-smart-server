name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/dev-build.yml'

jobs:
  build-and-push:
    name: Build & Push to ghcr.io
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      packages: write # Required to push to ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login to GitHub Container Registry (free, no extra secrets needed)
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags and labels
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/aurathink-server
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      # Build and push (uses layer cache for speed)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: SSH Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository_owner }}/aurathink-server:latest"

            echo "==> Login to ghcr.io..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            echo "==> Pulling new image: $IMAGE"
            docker pull $IMAGE

            echo "==> Updating repo..."
            cd ~/aurathink-server
            git pull https://${{ secrets.GH_PAT }}@github.com/lephuvu1994/euro-smart-server.git main

            echo "==> Running migrations..."
            docker run --rm \
              --env-file .env.production \
              --network aurathink-prod-network \
              $IMAGE \
              npx prisma migrate deploy

            echo "==> Restarting services..."
            IMAGE=$IMAGE docker compose -f docker-compose.prod.yml up -d \
              --no-build \
              core-api iot-gateway socket-gateway worker-service

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Health check..."
            sleep 8
            curl -sf http://localhost:3001/health/live || echo "WARNING: health check failed"

            echo "==> Deploy done! SHA: ${{ github.sha }}"
