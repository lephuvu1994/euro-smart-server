# ══════════════════════════════════════════════════════════════
# VPS2 "Mặt tiền" — Override
# ══════════════════════════════════════════════════════════════
# Chạy: core-api, emqx, nginx, haproxy
# Tắt: postgres, redis, iot-gateway, worker-service
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.vps2.yml --profile loadbalancer up -d
# ══════════════════════════════════════════════════════════════

services:
  emqx:
    environment:
      EMQX_NODE_NAME: 'emqx@100.85.73.41'

  # ── core-api: DB/Redis trỏ về VPS1 Tailscale ──
  core-api:
    environment:
      DATABASE_URL: 'postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@100.117.220.15:5432/${POSTGRES_DB}?schema=public'
      REDIS_HOST: '100.117.220.15'
      MQTT_HOST: 'mqtt://localhost'

  # ── Tắt service không cần trên VPS2 ──
  postgres:
    profiles: ['disabled']

  redis:
    profiles: ['disabled']

  iot-gateway:
    profiles: ['disabled']

  worker-service:
    profiles: ['disabled']

  # ── Bật HAProxy (override profile) ──
  haproxy:
    profiles: ['default']
