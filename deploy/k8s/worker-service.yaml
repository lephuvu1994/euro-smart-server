apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: sensa-smart
  labels:
    app: worker-service
    app.kubernetes.io/part-of: sensa-smart-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      terminationGracePeriodSeconds: 60  # Longer for BullMQ jobs to finish
      containers:
        - name: worker-service
          image: sensa-smart-server:latest
          command: ['node', 'dist/apps/worker-service/main.js']
          ports:
            - containerPort: 3004
              name: http
          envFrom:
            - configMapRef:
                name: sensa-smart-config
            - secretRef:
                name: sensa-smart-secrets
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '384Mi'
              cpu: '500m'
          livenessProbe:
            tcpSocket:
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  namespace: sensa-smart
  labels:
    app: worker-service
spec:
  selector:
    app: worker-service
  ports:
    - port: 3004
      targetPort: 3004
      name: http
  type: ClusterIP
