apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: euro-smart
  labels:
    app: core-api
    app.kubernetes.io/part-of: euro-smart-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: core-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: core-api
          image: euro-smart-server:latest
          command: ['node', 'dist/apps/core-api/main.js']
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: euro-smart-config
            - secretRef:
                name: euro-smart-secrets
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '1000m'
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: euro-smart
spec:
  selector:
    app: core-api
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: core-api-hpa
  namespace: euro-smart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: core-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
