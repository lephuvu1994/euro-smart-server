# ⚠️ WARNING: Replace placeholder values before applying!
# For production, use kubectl create secret or external secret managers (Vault, AWS SM, etc.)
#
# Quick create from CLI:
#   kubectl create secret generic euro-smart-secrets -n euro-smart \
#     --from-literal=DATABASE_URL='postgresql://user:pass@host:5432/db' \
#     --from-literal=AUTH_ACCESS_TOKEN_SECRET='your-secret' \
#     --from-literal=AUTH_REFRESH_TOKEN_SECRET='your-secret' \
#     --from-literal=REDIS_HOST='your-redis-host' \
#     --from-literal=REDIS_PASSWORD='your-redis-pass' \
#     --from-literal=MQTT_HOST='mqtt://your-host' \
#     --from-literal=MQTT_USER='admin' \
#     --from-literal=MQTT_PASS='password' \
#     --from-literal=MAIL_USER='email@gmail.com' \
#     --from-literal=MAIL_PASSWORD='app-password' \
#     --from-literal=MAIL_FROM='Support <email@gmail.com>' \
#     --from-literal=SENTRY_DSN=''
apiVersion: v1
kind: Secret
metadata:
  name: euro-smart-secrets
  namespace: euro-smart
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@host:5432/eurosmart?schema=public"
  AUTH_ACCESS_TOKEN_SECRET: "change-me-access-token-secret"
  AUTH_REFRESH_TOKEN_SECRET: "change-me-refresh-token-secret"
  REDIS_HOST: "your-redis-host"
  REDIS_USERNAME: "default"
  REDIS_PASSWORD: "your-redis-password"
  MQTT_HOST: "mqtt://your-mqtt-host"
  MQTT_USER: "admin"
  MQTT_PASS: "password"
  MAIL_USER: "your-email@gmail.com"
  MAIL_PASSWORD: "your-app-password"
  MAIL_FROM: "Smart Home Support <your-email@gmail.com>"
  SENTRY_DSN: ""
