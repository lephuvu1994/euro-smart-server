# Euro Smart Server – Nginx Reverse Proxy
# ── Copy to /etc/nginx/sites-available/euro-smart ──
# ── Then: ln -s /etc/nginx/sites-available/euro-smart /etc/nginx/sites-enabled/ ──

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ── Upstream definitions ──
upstream core_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream socket_gateway {
    server 127.0.0.1:3002;
    keepalive 32;
}

# ── REST API: api.yourdomain.com ──
server {
    listen 80;
    server_name api.yourdomain.com;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limit
    client_max_body_size 10m;

    # Rate limiting
    limit_req zone=api_limit burst=50 nodelay;

    location / {
        proxy_pass http://core_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check endpoint (no rate limit)
    location /health {
        limit_req off;
        proxy_pass http://core_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# ── WebSocket: ws.yourdomain.com ──
server {
    listen 80;
    server_name ws.yourdomain.com;

    location / {
        proxy_pass http://socket_gateway;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-specific timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 86400s;  # 24h for long-lived connections
        proxy_send_timeout 86400s;
    }
}

