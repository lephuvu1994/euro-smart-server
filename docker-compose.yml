# ══════════════════════════════════════════════════════════════════
# AURATHINK SERVER — Docker Compose (Development)
# ══════════════════════════════════════════════════════════════════
# Bao gồm toàn bộ infrastructure + 4 microservices.
# Dùng cho môi trường local development.
#
# Khởi chạy:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# Hot-reload (mount source):
#   docker compose up -d server (nếu dùng nodemon/ts-node)
# ══════════════════════════════════════════════════════════════════

name: aurathink-dev

services:
  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: euro-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-master123}
      POSTGRES_DB: ${POSTGRES_DB:-aurathink}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/timescaledb-init.sql:/docker-entrypoint-initdb.d/01_timescale.sql:ro
    networks:
      - euro-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aurathink}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: euro-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: >
      redis-server --maxmemory-policy noeviction
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - euro-network
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  emqx:
    image: emqx/emqx:5.8.5
    container_name: euro-emqx
    restart: unless-stopped
    ports:
      - '1883:1883' # MQTT TCP
      - '8083:8083' # MQTT over WebSocket
      - '8084:8084' # MQTT over WSS (TLS)
      - '8883:8883' # MQTT TLS
      - '18083:18083' # Dashboard Web UI
    environment:
      EMQX_NODE_NAME: 'emqx@node1.emqx.io'
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASS:-admin123}
      # Tắt anonymous access — bắt buộc xác thực
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__USER_ID_TYPE: username
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - euro-network
    healthcheck:
      test: ['CMD', 'emqx', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────────

  core-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: aurathink-server:dev
    container_name: euro-core-api
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-3001}:${HTTP_PORT:-3001}'
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
    command: ['node', 'dist/apps/core-api/main.js']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - euro-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--spider',
          '-q',
          'http://localhost:${HTTP_PORT:-3001}/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  socket-gateway:
    image: aurathink-server:dev
    container_name: euro-socket-gateway
    restart: unless-stopped
    ports:
      - '${SOCKET_GATEWAY_PORT:-3002}:${SOCKET_GATEWAY_PORT:-3002}'
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
    command: ['node', 'dist/apps/socket-gateway/main.js']
    depends_on:
      core-api:
        condition: service_healthy
    networks:
      - euro-network

  iot-gateway:
    image: aurathink-server:dev
    container_name: euro-iot-gateway
    restart: unless-stopped
    ports:
      - '${IOT_GATEWAY_PORT:-3003}:${IOT_GATEWAY_PORT:-3003}'
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
    command: ['node', 'dist/apps/iot-gateway/main.js']
    depends_on:
      core-api:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - euro-network

  worker-service:
    image: aurathink-server:dev
    container_name: euro-worker-service
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
    command: ['node', 'dist/apps/worker-service/main.js']
    depends_on:
      core-api:
        condition: service_healthy
    networks:
      - euro-network

  # ─────────────────────────────────────────────
  # DATABASE MIGRATION (run once then exit)
  # ─────────────────────────────────────────────
  migrate:
    image: aurathink-server:dev
    container_name: euro-migrate
    restart: 'no'
    env_file:
      - .env.docker
    command: ['npx', 'prisma', 'migrate', 'deploy']
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - euro-network

# ─────────────────────────────────────────────
# NETWORKS & VOLUMES
# ─────────────────────────────────────────────

networks:
  euro-network:
    driver: bridge
    name: aurathink-network

volumes:
  postgres_data:
    name: euro-postgres-data
  redis_data:
    name: euro-redis-data
  emqx_data:
    name: euro-emqx-data
  emqx_log:
    name: euro-emqx-log
