apiVersion: v1
kind: ConfigMap
metadata:
  name: aurathink-config
  namespace: aurathink
data:
  APP_ENV: "production"
  APP_NAME: "aurathink"
  APP_DEBUG: "false"
  APP_LOG_LEVEL: "info"
  HTTP_HOST: "0.0.0.0"
  HTTP_PORT: "3001"
  HTTP_VERSIONING_ENABLE: "true"
  HTTP_VERSION: "1"
  APP_CORS_ORIGINS: "*"
  SOCKET_GATEWAY_PORT: "3002"
  IOT_GATEWAY_PORT: "3003"
  WORKER_SERVICE_PORT: "3004"
  AUTH_ACCESS_TOKEN_EXP: "1d"
  AUTH_REFRESH_TOKEN_EXP: "7d"
  REDIS_PORT: "6379"
  REDIS_ENABLE_TLS: "false"
  MQTT_PORT: "8883"
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
