global
    log stdout format raw local0
    maxconn 50000
    # Spread health checks over time
    spread-checks 5

defaults
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    log global
    option redispatch
    retries 3

# ══════════════════════════════════════════════════════════════
# HTTP API Load Balancer
# ══════════════════════════════════════════════════════════════
frontend http_api
    mode http
    bind *:8080
    option forwardfor
    default_backend api_servers

backend api_servers
    mode http
    balance roundrobin
    option httpchk GET /health/live
    http-check expect status 200
    server vps1-api 127.0.0.1:3001 check inter 10s fall 3 rise 2
    server vps2-api 100.85.73.41:3001 check inter 10s fall 3 rise 2

# ══════════════════════════════════════════════════════════════
# WebSocket (Socket Gateway)
# ══════════════════════════════════════════════════════════════
frontend ws_gateway
    mode http
    bind *:8082
    default_backend ws_servers

backend ws_servers
    mode http
    balance leastconn
    option http-server-close
    # WebSocket support
    option forwardfor
    server vps1-ws 127.0.0.1:3002 check inter 10s fall 3 rise 2
    server vps2-ws 100.85.73.41:3002 check inter 10s fall 3 rise 2

# ══════════════════════════════════════════════════════════════
# IoT Gateway
# ══════════════════════════════════════════════════════════════
frontend iot_gateway
    mode http
    bind *:8083
    default_backend iot_servers

backend iot_servers
    mode http
    balance roundrobin
    server vps1-iot 127.0.0.1:3003 check inter 10s fall 3 rise 2
    server vps2-iot 100.85.73.41:3003 check inter 10s fall 3 rise 2

# ══════════════════════════════════════════════════════════════
# MQTT Load Balancer (TCP mode)
# ══════════════════════════════════════════════════════════════
frontend mqtt_lb
    mode tcp
    bind *:11883
    default_backend mqtt_servers

backend mqtt_servers
    mode tcp
    balance roundrobin
    option tcp-check
    server emqx1 127.0.0.1:1883 check inter 10s fall 3 rise 2
    server emqx2 100.85.73.41:1883 check inter 10s fall 3 rise 2

# ══════════════════════════════════════════════════════════════
# HAProxy Stats Dashboard
# ══════════════════════════════════════════════════════════════
listen stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
