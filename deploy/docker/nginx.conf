# ══════════════════════════════════════════════════════════════════
# EURO SMART SERVER — Nginx Reverse Proxy (Docker)
# ══════════════════════════════════════════════════════════════════
# Dùng trong docker-compose.prod.yml
# Truy cập:
#   HTTP  → http://your-domain:80  (redirect sang HTTPS)
#   HTTPS → https://your-domain:443
#   API   → /api/...  → core-api:3001
#   IOT   → /iot/... → iot-gateway:3003
# ══════════════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Docker DNS Resolver ──
    # 127.0.0.11 = Docker embedded DNS. valid=10s forces re-resolve
    # on every request cycle, preventing stale IP after container restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name _;

        # ACME challenge (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ──
    server {
        listen 443 ssl http2;
        server_name aurathink.ddns.net;  # ✏️ Thay bằng domain thật

        # ── SSL ──
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (sau khi xác nhận SSL hoạt động tốt)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # ── Security Headers ──
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # ── Proxy Defaults ──
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        client_max_body_size  20m;

        # ── REST API ──
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            # Use internal docker resolver by appending domain to variable
            set $upstream_core_api "http://core-api:3001";
            rewrite ^/api/(.*)$ /$1 break;
            
            proxy_pass $upstream_core_api;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Health check (no rate limit) ──
        location /health {
            set $upstream_core_api "http://core-api:3001";
            proxy_pass $upstream_core_api/health;
            access_log off;
        }

        # ── IoT Gateway HTTP ──
        location /iot/ {
            set $upstream_iot_gw "http://iot-gateway:3003";
            rewrite ^/iot/(.*)$ /$1 break;
            
            proxy_pass $upstream_iot_gw;
        }

        # ── EMQX WebSocket (WSS proxy) ──
        location /mqtt {
            set $upstream_emqx "http://emqx:8083";
            proxy_pass $upstream_emqx/mqtt;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400; # Prevent websocket timeout
            proxy_send_timeout 86400;
        }

        # ── EMQX Dashboard (nên giới hạn IP trong production) ──
        # location /emqx/ {
        #     allow 10.0.0.0/8;  # Chỉ internal network
        #     deny all;
        #     proxy_pass http://emqx:18083/;
        # }

        # ── 404 fallback ──
        location / {
            return 404 '{"error":"Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
