apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aurathink-ingress
  namespace: aurathink
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: '10m'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    # WebSocket support for socket-gateway
    nginx.ingress.kubernetes.io/proxy-http-version: '1.1'
    nginx.ingress.kubernetes.io/proxy-set-headers: 'aurathink/custom-headers'
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - api.yourdomain.com
  #       - ws.yourdomain.com
  #     secretName: aurathink-tls
  rules:
    # ── REST API ──
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core-api
                port:
                  number: 3001
    # ── WebSocket Gateway ──
    - host: ws.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: socket-gateway
                port:
                  number: 3002
---
# Custom headers ConfigMap for WebSocket upgrade
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-headers
  namespace: aurathink
data:
  Upgrade: '$http_upgrade'
  Connection: 'upgrade'
