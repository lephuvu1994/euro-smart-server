name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/dev-build.yml'

jobs:
  build-and-push:
    name: Build & Push to ghcr.io
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # Required to push to ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login to GitHub Container Registry (free, no extra secrets needed)
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags and labels
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/aurathink-server
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      # Build and push (uses layer cache for speed)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Deploy to ALL VPS servers in parallel
  # ─────────────────────────────────────────────
  # GitHub Secrets cần tạo:
  #
  #   Chung:
  #     ENV_PRODUCTION   — nội dung file .env (dùng chung cả 2 VPS)
  #     GH_PAT           — GitHub PAT (read:packages + repo)
  #
  #   VPS1:
  #     VPS1_HOST, VPS1_USER, VPS1_SSH_KEY, VPS1_PORT
  #
  #   VPS2:
  #     VPS2_HOST, VPS2_USER, VPS2_SSH_KEY, VPS2_PORT

  deploy-vps1:
    name: Deploy → VPS1
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH Deploy to VPS1
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS1_HOST }}
          username: ${{ secrets.VPS1_USER }}
          key: ${{ secrets.VPS1_SSH_KEY }}
          port: ${{ secrets.VPS1_PORT || 22 }}
          envs: ENV_PRODUCTION,GH_PAT
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository_owner }}/aurathink-server:latest"

            echo "==> [VPS1] Login to ghcr.io..."
            echo "$GH_PAT" | docker login ghcr.io \
              -u ${{ github.repository_owner }} --password-stdin

            echo "==> [VPS1] Pulling new image: $IMAGE"
            docker pull $IMAGE

            echo "==> [VPS1] Updating repo..."
            cd ~/aurathink-server
            git fetch https://${GH_PAT}@github.com/lephuvu1994/euro-smart-server.git main
            git reset --hard FETCH_HEAD

            echo "==> [VPS1] Writing .env from secret..."
            printf '%s\n' "$ENV_PRODUCTION" > /root/aurathink-server/.env

            echo "==> [VPS1] Running migrations..."
            docker run --rm \
              --env-file /root/aurathink-server/.env \
              -e REDIS_HOST=redis \
              -e MQTT_HOST=mqtt://emqx \
              --network aurathink-prod-network \
              $IMAGE \
              npx prisma migrate deploy

            echo "==> [VPS1] Restarting services..."
            IMAGE=$IMAGE docker compose -f /root/aurathink-server/docker-compose.prod.yml up -d \
              --no-build --force-recreate \
              core-api iot-gateway socket-gateway worker-service

            echo "==> [VPS1] Cleaning up old images..."
            docker image prune -f

            echo "==> [VPS1] Health check (wait 30s)..."
            sleep 30
            curl -sf http://127.0.0.1/health || echo "WARNING: health check failed"

            echo "==> [VPS1] Deploy done! SHA: ${{ github.sha }}"

  deploy-vps2:
    name: Deploy → VPS2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH Deploy to VPS2
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS2_HOST }}
          username: ${{ secrets.VPS2_USER }}
          key: ${{ secrets.VPS2_SSH_KEY }}
          port: ${{ secrets.VPS2_PORT || 22 }}
          envs: ENV_PRODUCTION,GH_PAT
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository_owner }}/aurathink-server:latest"

            echo "==> [VPS2] Login to ghcr.io..."
            echo "$GH_PAT" | docker login ghcr.io \
              -u ${{ github.repository_owner }} --password-stdin

            echo "==> [VPS2] Pulling new image: $IMAGE"
            docker pull $IMAGE

            echo "==> [VPS2] Updating repo..."
            cd ~/aurathink-server
            git fetch https://${GH_PAT}@github.com/lephuvu1994/euro-smart-server.git main
            git reset --hard FETCH_HEAD

            echo "==> [VPS2] Writing .env from secret..."
            printf '%s\n' "$ENV_PRODUCTION" > /root/aurathink-server/.env

            echo "==> [VPS2] Running migrations..."
            docker run --rm \
              --env-file /root/aurathink-server/.env \
              -e REDIS_HOST=redis \
              -e MQTT_HOST=mqtt://emqx \
              --network aurathink-prod-network \
              $IMAGE \
              npx prisma migrate deploy

            echo "==> [VPS2] Restarting services..."
            IMAGE=$IMAGE docker compose -f /root/aurathink-server/docker-compose.prod.yml up -d \
              --no-build --force-recreate \
              core-api iot-gateway socket-gateway worker-service

            echo "==> [VPS2] Cleaning up old images..."
            docker image prune -f

            echo "==> [VPS2] Health check (wait 30s)..."
            sleep 30
            curl -sf http://127.0.0.1/health || echo "WARNING: health check failed"

            echo "==> [VPS2] Deploy done! SHA: ${{ github.sha }}"
