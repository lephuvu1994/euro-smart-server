name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/dev-build.yml'

jobs:
  build-and-push:
    name: Build & Push to ghcr.io
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/aurathink-server
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # GĐ1: VPS1 chạy TẤT CẢ services (single node)
  # ─────────────────────────────────────────────
  deploy-vps1:
    name: Deploy → VPS1 (All services)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH Deploy to VPS1
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS1_HOST }}
          username: ${{ secrets.VPS1_USER }}
          key: ${{ secrets.VPS1_SSH_KEY }}
          port: ${{ secrets.VPS1_PORT || 22 }}
          envs: ENV_PRODUCTION,GH_PAT
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository_owner }}/aurathink-server:latest"

            echo "==> [VPS1] Login to ghcr.io..."
            echo "$GH_PAT" | docker login ghcr.io \
              -u ${{ github.repository_owner }} --password-stdin

            echo "==> [VPS1] Pulling new image..."
            docker pull $IMAGE

            echo "==> [VPS1] Updating repo..."
            cd ~/aurathink-server
            git fetch https://${GH_PAT}@github.com/lephuvu1994/euro-smart-server.git main
            git reset --hard FETCH_HEAD

            echo "==> [VPS1] Writing .env from secret..."
            printf '%s\n' "$ENV_PRODUCTION" > /root/aurathink-server/.env
            # Strip surrounding quotes from values (Docker env_file reads them literally)
            sed -i 's/="\(.*\)"/=\1/g' /root/aurathink-server/.env

            echo "==> [VPS1] Running migrations..."
            docker run --rm \
              --env-file /root/aurathink-server/.env \
              -e REDIS_HOST=redis \
              -e MQTT_HOST=mqtt://emqx \
              --network aurathink-prod-network \
              $IMAGE \
              npx prisma migrate deploy

            echo "==> [VPS1] Restarting ALL services (GĐ1 — single node)..."
            IMAGE=$IMAGE docker compose \
              -f docker-compose.prod.yml \
              up -d --no-build --force-recreate \
              core-api iot-gateway socket-gateway worker-service

            echo "==> [VPS1] Cleanup..."
            docker image prune -f

            echo "==> [VPS1] Health check (wait 15s)..."
            sleep 15
            curl -sf http://127.0.0.1/health || echo "WARNING: health check failed"

            echo "==> [VPS1] Done! SHA: ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # GĐ2: VPS2 — "Mặt tiền" (CHƯA KÍCH HOẠT)
