# ══════════════════════════════════════════════════════════════
# VPS1 "Hậu cung" — Override
# ══════════════════════════════════════════════════════════════
# Chạy: postgres, redis, emqx, iot-gateway, worker-service
# Tắt: core-api, nginx, haproxy
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.vps1.yml up -d
# ══════════════════════════════════════════════════════════════

services:
  # ── Giữ nguyên ──
  postgres:
    # Bind Tailscale IP cho VPS2 kết nối
    ports:
      - '100.117.220.15:5432:5432'

  redis:
    ports:
      - '100.117.220.15:6379:6379'

  emqx:
    environment:
      EMQX_NODE_NAME: 'emqx@100.117.220.15'

  # ── Tắt service không cần trên VPS1 ──
  core-api:
    profiles: ['disabled']

  nginx:
    profiles: ['disabled']

  haproxy:
    profiles: ['disabled']

  # ── FIX: Override depends_on ──
  # core-api bị disabled → Docker Compose báo lỗi "depends on undefined service" → không start
  # Solution: override depends_on để iot-gateway & worker-service phụ thuộc trực tiếp
  # vào các service thực sự chạy trên VPS1 (postgres, redis, emqx)
  iot-gateway:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy

  worker-service:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
