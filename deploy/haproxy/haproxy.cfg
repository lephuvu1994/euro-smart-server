global
    log stdout format raw local0
    maxconn 50000
    spread-checks 5

defaults
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    log global
    option redispatch
    retries 3

# ══════════════════════════════════════════════════════════════
# HTTP API Load Balancer
# VPS2 (local) = primary, VPS1 (Tailscale) = backup
# ══════════════════════════════════════════════════════════════
frontend http_api
    mode http
    bind *:8080
    option forwardfor
    default_backend api_servers

backend api_servers
    mode http
    balance roundrobin
    option httpchk GET /health/live
    http-check expect status 200
    server vps2-api 127.0.0.1:3001 check inter 10s fall 3 rise 2

# ══════════════════════════════════════════════════════════════
# IoT Gateway
# ══════════════════════════════════════════════════════════════
frontend iot_gateway_front
    mode http
    bind *:13003
    default_backend iot_servers

backend iot_servers
    mode http
    balance roundrobin
    server vps1-iot 100.117.220.15:3003 check inter 10s fall 3 rise 2

# ══════════════════════════════════════════════════════════════
# MQTTS (8883) → TLS Termination → EMQX (1883)
# IoT devices connect: mqtts://domain:8883
# ══════════════════════════════════════════════════════════════
frontend mqtts_lb
    mode tcp
    bind *:8883 ssl crt /etc/haproxy/certs/mqtt.pem
    default_backend mqtt_servers

backend mqtt_servers
    mode tcp
    balance leastconn
    option tcp-check
    server emqx1 127.0.0.1:1883 check inter 10s fall 3 rise 2
    server emqx2 100.117.220.15:1883 check inter 10s fall 3 rise 2

# ══════════════════════════════════════════════════════════════
# HAProxy Stats Dashboard (internal)
# ══════════════════════════════════════════════════════════════
listen stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
