# ══════════════════════════════════════════════════════════════════
# AURATHINK SERVER — Docker Compose (Production)
# ══════════════════════════════════════════════════════════════════
# Infrastructure (Postgres, Redis, EMQX) chạy cùng trong compose.
# Nginx reverse proxy expose port 80/443 ra ngoài.
#
# Khởi chạy lần đầu:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up migrate   # chạy DB migration
#   docker compose -f docker-compose.prod.yml up -d
#
# Cập nhật:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d --no-deps core-api iot-gateway worker-service
#
# Logs:
#   docker compose -f docker-compose.prod.yml logs -f --tail=100
# ══════════════════════════════════════════════════════════════════

name: aurathink-prod

services:
  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: aurathink-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-aurathink}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/timescaledb-init.sql:/docker-entrypoint-initdb.d/01_timescale.sql:ro
    networks:
      - euro-internal
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-aurathink}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    # GĐ2: Expose cho VPS2 qua Tailscale
    ports:
      - '${TAILSCALE_IP:-127.0.0.1}:5432:5432'

  redis:
    image: redis:7-alpine
    container_name: aurathink-redis-prod
    restart: unless-stopped
    command: >
      redis-server --maxmemory-policy noeviction
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
    volumes:
      - redis_data:/data
    networks:
      - euro-internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    # GĐ2: Expose cho VPS2 qua Tailscale
    ports:
      - '${TAILSCALE_IP:-127.0.0.1}:6379:6379'

  emqx:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.emqx
    image: aurathink-emqx-prod:5.8.5
    container_name: aurathink-emqx-prod
    restart: unless-stopped
    ports:
      - '1883:1883' # MQTT TCP — IoT devices kết nối
      # 8883 MQTTS → handled by HAProxy TLS termination
      - '8083:8083' # MQTT WebSocket
      - '18083:18083' # Dashboard — nên giới hạn firewall
      - '4370:4370' # Erlang distribution (cluster)
      - '5370:5370' # EMQX cluster RPC
    environment:
      # Cluster config — EMQX_NODE_NAME set via .env.production per VPS
      EMQX_NODE_NAME: ${EMQX_NODE_NAME:-emqx@127.0.0.1}
      EMQX_CLUSTER__DISCOVERY_STRATEGY: static
      EMQX_CLUSTER__STATIC__SEEDS: '["emqx@100.117.220.15","emqx@100.85.73.41"]'
      # Dashboard
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASS:?EMQX_DASHBOARD_PASS is required}
      
      # Note: Cấu hình auth/authz được nhúng vào emqx.conf qua deploy/docker/Dockerfile.emqx

      # Performance tuning
      EMQX_BROKER__SHARED_SUBSCRIPTION: 'true'
      EMQX_LOG__CONSOLE__LEVEL: warning
    volumes:
      - ./deploy/docker/emqx-custom.conf:/opt/emqx/etc/emqx-custom.conf:ro
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - euro-internal
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sf http://localhost:18083/status || exit 1',
        ]

      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'


  # ─────────────────────────────────────────────
  # DATABASE MIGRATION (chạy 1 lần rồi thoát)
  # ─────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE:-ghcr.io/lephuvu1994/aurathink-server:latest}
    container_name: aurathink-migrate-prod
    restart: 'no'
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: ['npx', 'prisma', 'migrate', 'deploy']
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - euro-internal

  # ─────────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────────

  core-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE:-ghcr.io/lephuvu1994/aurathink-server:latest}
    container_name: aurathink-core-api-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      MQTT_HOST: mqtt://emqx
      MQTT_PORT: '1883'
      APP_MQTT_SECRET: ${APP_MQTT_SECRET}
      MQTT_WSS_URL: ${MQTT_WSS_URL}
    command: ['/app/entrypoint.sh', 'dist/apps/core-api/main.js']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - euro-internal
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--spider',
          '-q',
          'http://127.0.0.1:${HTTP_PORT:-3001}/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      # Prisma migrations có thể mất ~3 phút. start_period phải đủ lớn
      # để gateway/worker không start trước khi core-api HTTP sẵn sàng.
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'


  iot-gateway:
    image: ${IMAGE:-ghcr.io/lephuvu1994/aurathink-server:latest}
    container_name: aurathink-iot-gateway-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      MQTT_HOST: mqtt://emqx
      MQTT_PORT: '1883'
      APP_MQTT_SECRET: ${APP_MQTT_SECRET}
      MQTT_WSS_URL: ${MQTT_WSS_URL}
    command: ['node', 'dist/apps/iot-gateway/main.js']
    depends_on:
      emqx:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - euro-internal
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: '30m'
        max-file: '5'

  worker-service:
    image: ${IMAGE:-ghcr.io/lephuvu1994/aurathink-server:latest}
    container_name: aurathink-worker-service-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    command: ['node', 'dist/apps/worker-service/main.js']
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - euro-internal
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: '30m'
        max-file: '5'

  # ─────────────────────────────────────────────
  # HAPROXY LOAD BALANCER (GĐ2: VPS2 Mặt tiền)
  # ─────────────────────────────────────────────
  haproxy:
    image: haproxy:2.9-alpine
    container_name: aurathink-haproxy-prod
    restart: unless-stopped
    network_mode: host
    command: >
      /bin/sh -c "cat /etc/haproxy/certs/fullchain.pem /etc/haproxy/certs/privkey.pem > /etc/haproxy/certs/mqtt.pem && chmod 644 /etc/haproxy/certs/mqtt.pem && haproxy -f /usr/local/etc/haproxy/haproxy.cfg"
    volumes:
      - ./deploy/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ${SSL_CERT_PATH:-./deploy/docker/ssl}:/etc/haproxy/certs:rw
    healthcheck:
      test: ['CMD', 'haproxy', '-c', '-f', '/usr/local/etc/haproxy/haproxy.cfg']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'
    profiles:
      - loadbalancer

  # ─────────────────────────────────────────────
  # NGINX REVERSE PROXY
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: euro-nginx-prod
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates — mount từ host sau khi có cert
      - ${SSL_CERT_PATH:-./deploy/docker/ssl}:/etc/nginx/ssl:ro
      # ACME challenge cho certbot
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      emqx:
        condition: service_healthy
    networks:
      - euro-internal
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'


# ─────────────────────────────────────────────
# NETWORKS & VOLUMES
# ─────────────────────────────────────────────

networks:
  euro-internal:
    driver: bridge
    name: aurathink-prod-network
    # Chỉ expose qua nginx, các service không bind port ra host

volumes:
  postgres_data:
    name: euro-prod-postgres-data
  redis_data:
    name: euro-prod-redis-data
  emqx_data:
    name: euro-prod-emqx-data
  emqx_log:
    name: euro-prod-emqx-log
  certbot_webroot:
    name: euro-prod-certbot-webroot
