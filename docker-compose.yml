# ══════════════════════════════════════════════════════════════════
# SENSA-SMART SERVER — Docker Compose (Development)
# ══════════════════════════════════════════════════════════════════
# Bao gồm toàn bộ infrastructure + 4 microservices.
# Dùng cho môi trường local development.
#
# Khởi chạy:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# Hot-reload (mount source):
#   docker compose up -d server (nếu dùng nodemon/ts-node)
# ══════════════════════════════════════════════════════════════════

name: sensa-smart-dev

services:
  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sensa-smart-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-master123}
      POSTGRES_DB: ${POSTGRES_DB:-sensa_smart}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/timescaledb-init.sql:/docker-entrypoint-initdb.d/01_timescale.sql:ro
    networks:
      - sensa-smart-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sensa_smart}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: sensa-smart-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: >
      redis-server --maxmemory-policy noeviction
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - sensa-smart-network
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  emqx:
    image: emqx/emqx:5.8.5
    container_name: sensa-smart-emqx
    restart: unless-stopped
    ports:
      - '1883:1883' # MQTT TCP
      - '8083:8083' # MQTT over WebSocket
      - '8084:8084' # MQTT over WSS (TLS)
      - '8883:8883' # MQTT TLS
      - '18083:18083' # Dashboard Web UI
    environment:
      EMQX_NODE_NAME: 'emqx@node1.emqx.io'
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASS:-admin123}
      # Tắt anonymous access — HTTP Auth → core-api
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: http
      EMQX_AUTHENTICATION__1__METHOD: post
      EMQX_AUTHENTICATION__1__URL: 'http://${EMQX_AUTH_API_HOST:-core-api}:${HTTP_PORT:-3001}/v1/internal/emqx/auth'
      EMQX_AUTHENTICATION__1__BODY__USERNAME: '$${username}'
      EMQX_AUTHENTICATION__1__BODY__PASSWORD: '$${password}'
      EMQX_AUTHENTICATION__1__BODY__CLIENTID: '$${clientid}'
      EMQX_AUTHENTICATION__1__HEADERS__CONTENT_TYPE: 'application/json'
      # HTTP ACL → core-api
      EMQX_AUTHORIZATION__NO_MATCH: deny
      EMQX_AUTHORIZATION__SOURCES__1__TYPE: http
      EMQX_AUTHORIZATION__SOURCES__1__ENABLE: 'true'
      EMQX_AUTHORIZATION__SOURCES__1__METHOD: post
      EMQX_AUTHORIZATION__SOURCES__1__URL: 'http://${EMQX_AUTH_API_HOST:-core-api}:${HTTP_PORT:-3001}/v1/internal/emqx/acl'
      EMQX_AUTHORIZATION__SOURCES__1__BODY__USERNAME: '$${username}'
      EMQX_AUTHORIZATION__SOURCES__1__BODY__TOPIC: '$${topic}'
      EMQX_AUTHORIZATION__SOURCES__1__BODY__ACTION: '$${action}'
      EMQX_AUTHORIZATION__SOURCES__1__HEADERS__CONTENT_TYPE: 'application/json'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - sensa-smart-network
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:18083/status || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────────

  core-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sensa-smart-server:dev
    container_name: sensa-smart-core-api
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-3001}:${HTTP_PORT:-3001}'
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
    command: ['node', 'dist/apps/core-api/main.js']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - sensa-smart-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--spider',
          '-q',
          'http://localhost:${HTTP_PORT:-3001}/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  iot-gateway:
    image: sensa-smart-server:dev
    container_name: sensa-smart-iot-gateway
    restart: unless-stopped
    ports:
      - '${IOT_GATEWAY_PORT:-3003}:${IOT_GATEWAY_PORT:-3003}'
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
    command: ['node', 'dist/apps/iot-gateway/main.js']
    depends_on:
      core-api:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - sensa-smart-network

  worker-service:
    image: sensa-smart-server:dev
    container_name: sensa-smart-worker-service
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
    command: ['node', 'dist/apps/worker-service/main.js']
    depends_on:
      core-api:
        condition: service_healthy
    networks:
      - sensa-smart-network

  # ─────────────────────────────────────────────
  # DATABASE MIGRATION (run once then exit)
  # ─────────────────────────────────────────────
  migrate:
    image: sensa-smart-server:dev
    container_name: sensa-smart-migrate
    restart: 'no'
    env_file:
      - .env.docker
    command: ['npx', 'prisma', 'migrate', 'deploy']
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sensa-smart-network

  # ─────────────────────────────────────────────
  # EMQX LOCAL SETUP (run once then exit)
  # ─────────────────────────────────────────────
  emqx-setup:
    image: alpine:latest
    container_name: sensa-smart-emqx-setup
    restart: 'no'
    volumes:
      - ./deploy/docker/init-emqx-auth.sh:/app/init-emqx-auth.sh:ro
    env_file:
      - .env
    environment:
      EMQX_API_URL: "http://emqx:18083"
    command: >
      sh -c "apk add --no-cache curl && /app/init-emqx-auth.sh"
    depends_on:
      emqx:
        condition: service_healthy
    networks:
      - sensa-smart-network

# ─────────────────────────────────────────────
# NETWORKS & VOLUMES
# ─────────────────────────────────────────────

networks:
  sensa-smart-network:
    driver: bridge
    name: sensa-smart-network

volumes:
  postgres_data:
    name: sensa-smart-postgres-data
  redis_data:
    name: sensa-smart-redis-data
  emqx_data:
    name: sensa-smart-emqx-data
  emqx_log:
    name: sensa-smart-emqx-log
