authentication = [
  {
    mechanism = password_based
    backend = http
    method = post
    url = "http://core-api:3001/v1/internal/emqx/auth"
    headers {
      content_type = "application/json"
    }
    body {
      username = "${username}"
      password = "${password}"
      clientid = "${clientid}"
    }
  }
]

authorization {
  no_match = deny
  sources = [
    {
      type = http
      enable = true
      method = post
      url = "http://core-api:3001/v1/internal/emqx/acl"
      headers {
        content_type = "application/json"
      }
      body {
        username = "${username}"
        topic = "${topic}"
        action = "${action}"
      }
    }
  ]
}
